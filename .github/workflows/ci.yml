name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run focused invariant suites
        run: python -m unittest -v tests.test_runtime_flows tests.test_validation_detection tests.test_verifier tests.test_shell_policy

      - name: Run full unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Check CLI import surface
        run: python -m echo.cli.app --help

      - name: Check npm launcher install surface
        run: |
          npm install -g . --prefix "$RUNNER_TEMP/echo-agent-npm"
          export PATH="$RUNNER_TEMP/echo-agent-npm/bin:$PATH"
          export ECHO_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          echo-agent --help
          echocode --help
